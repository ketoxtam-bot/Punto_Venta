
name: Compilar APK Simplificado

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar Codigo
      uses: actions/checkout@v4

    - name: Configurar Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Instalar Cordova para Empaquetado
      run: npm install -g cordova

    - name: Crear Contenedor Nativo
      run: |
        cordova create android-app com.fidx.pos "FIDX POS"
        cd android-app
        cordova platform add android
        # Copiar tus archivos web al contenedor
        rm -rf www/*
        cp -r ../* www/ || true
        # Compilar la APK
        cordova build android --debug

    - name: Entregar APK
      uses: actions/upload-artifact@v4
      with:
        name: fidx-nfc-apk
        path: android-app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
